name: Build Butterscotch Preprocessor

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build CLI
        run: ./gradlew :processor-cli:installDist

      - name: Package CLI
        run: |
          mkdir -p artifacts
          cp -r processor-cli/build/install/processor-cli artifacts/

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: butterscotch-preprocessor-linux
          path: artifacts/
